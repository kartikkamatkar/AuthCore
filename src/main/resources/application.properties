spring.application.name=Authcore
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_core
spring.datasource.username=postgres
spring.datasource.password=postgresql
server.port=8081
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# JWT secret used to sign tokens. Override in production via environment variable.
# Example: export JWT_SECRET="your-production-secret"
jwt.secret=${JWT_SECRET:mydevsecretmydevsecretmydevsecret1234567890}
