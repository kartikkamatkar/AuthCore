<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Login Page</h1>
    
    <form action="/login.html" method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <br>
        <input type="submit" value="Login">
    </form>

    <script>
        // Handle form submission 
        document.querySelector('form').addEventListener('submit', function(event){
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Perform login and send data to server 
            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ username, password })
            })
            .then(response => {
                if (response.ok) {
                    return response.text(); // Passes the token string to the next block
                } else {
                    throw new Error('Login failed');
                }
            })
            .then(data => {
                localStorage.setItem("token", data); // Stores the login token safely
                alert('Login Successful');
                window.location.href = '/dashboard.html'; // Redirects user
            })
            .catch(error => {
                console.error('Error for login:', username, error);
                alert('Login failed. Please check your credentials.');
            });
        }); // <-- FIXED: Added missing closure for the addEventListener block
    </script>
</body>
</html>
